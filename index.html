<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedi Vibe — Стратегическая креативная сессия</title>
    
    <!-- Подключение шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
    
    <!-- Подключение Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Подключение React и Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Глобальные стили -->
    <style>
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes spin-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        /* Плавный скролл */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-[#F9F9F7] text-[#1C1C1A] font-sans selection:bg-[#8A735E] selection:text-white antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Ссылка на Telegram с предзаполненным сообщением
        const TELEGRAM_LINK = "https://t.me/vedi_irina?text=" + encodeURIComponent("Ирина, добрый день. Хочу обсудить стратегическую сессию по сборке концепции.");

        // Минималистичный символ с плавной ротацией орбит
        const VediVibeLogo = ({ className = "w-12 h-12", light = false }) => (
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" className={className}>
                <circle cx="50" cy="50" r="4" fill="#8A735E" />
                <path 
                    d="M20 50C20 33.4315 33.4315 20 50 20" 
                    stroke={light ? "white" : "#1C1C1A"} strokeWidth="1.5" strokeLinecap="round"
                    className="origin-center"
                    style={{ animation: 'spin 40s linear infinite' }} 
                />
                <path 
                    d="M80 50C80 66.5685 66.5685 80 50 80" 
                    stroke="#8A735E" strokeWidth="1.5" strokeLinecap="round" strokeDasharray="2 6"
                    className="origin-center"
                    style={{ animation: 'spin-reverse 60s linear infinite' }}
                />
            </svg>
        );

        // Компонент оптического проявления (FadeIn + Blur)
        const FadeIn = ({ children, delay = 0, className = "" }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const currentRef = ref.current;
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) setIsVisible(true);
                    },
                    { threshold: 0.15, rootMargin: '0px 0px -50px 0px' }
                );
                if (currentRef) observer.observe(currentRef);
                return () => {
                    if (currentRef) observer.unobserve(currentRef);
                };
            }, []);

            return (
                <div 
                    ref={ref} 
                    className={`transition-all duration-1000 ease-out ${isVisible ? 'opacity-100 translate-y-0 blur-none' : 'opacity-0 translate-y-6 blur-md'} ${className}`}
                    style={{ transitionDelay: `${delay}ms` }}
                >
                    {children}
                </div>
            );
        };

        // Рамка фокуса (Focus Frame)
        const FocusFrame = ({ children, className = "", dark = false }) => {
            const borderColor = dark ? "border-[#4A4A4A]" : "border-[#8A735E]";
            return (
                <div className={`relative p-8 md:p-10 ${className}`}>
                    <div className={`absolute top-0 left-0 w-4 h-4 border-t border-l ${borderColor} opacity-60 transition-all duration-700 ease-out`}></div>
                    <div className={`absolute top-0 right-0 w-4 h-4 border-t border-r ${borderColor} opacity-60 transition-all duration-700 ease-out`}></div>
                    <div className={`absolute bottom-0 left-0 w-4 h-4 border-b border-l ${borderColor} opacity-60 transition-all duration-700 ease-out`}></div>
                    <div className={`absolute bottom-0 right-0 w-4 h-4 border-b border-r ${borderColor} opacity-60 transition-all duration-700 ease-out`}></div>
                    {children}
                </div>
            );
        };

        // Блок со световой сеткой (Spotlight Grid)
        const SpotlightGrid = ({ children, className = "" }) => {
            const [mousePos, setMousePos] = useState({ x: -1000, y: -1000 });
            
            const handleMouseMove = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                setMousePos({ x: e.clientX - rect.left, y: e.clientY - rect.top });
            };

            return (
                <div 
                    className={`relative group ${className}`} 
                    onMouseMove={handleMouseMove}
                    onMouseLeave={() => setMousePos({ x: -1000, y: -1000 })}
                >
                    <div 
                        className="absolute inset-0 pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity duration-700 z-0"
                        style={{ 
                            background: `radial-gradient(800px circle at ${mousePos.x}px ${mousePos.y}px, rgba(138, 115, 94, 0.08), transparent 40%)` 
                        }}
                    ></div>
                    {children}
                </div>
            );
        };

        // Сквозная линия прогресса сборки
        const ScrollProgressLine = () => {
            const [height, setHeight] = useState(0);

            useEffect(() => {
                const handleScroll = () => {
                    const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
                    const scrollHeight = document.documentElement.scrollHeight || document.body.scrollHeight;
                    const clientHeight = document.documentElement.clientHeight || window.innerHeight;
                    const windowHeight = scrollHeight - clientHeight;
                    const scroll = windowHeight > 0 ? scrollTop / windowHeight : 0;
                    setHeight(scroll * 100);
                };
                
                handleScroll();
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="fixed left-4 md:left-12 top-0 bottom-0 w-[1px] bg-[#1C1C1A]/10 z-0 hidden md:block mix-blend-multiply">
                    <div 
                        className="w-full bg-[#8A735E]" 
                        style={{ height: `${height}%`, transition: 'height 0.1s ease-out' }}
                    ></div>
                </div>
            );
        };

        const Section = ({ children, className = "", id = "" }) => (
            <section id={id} className={`py-20 md:py-32 px-5 md:pl-32 w-full flex justify-center relative z-10 ${className}`}>
                <div className="w-full max-w-3xl">
                    {children}
                </div>
            </section>
        );

        const Button = ({ children, href = TELEGRAM_LINK, variant = "primary" }) => {
            const baseStyle = "group relative inline-flex items-center justify-center w-full md:w-auto px-10 py-5 text-lg overflow-hidden transition-all duration-500 cursor-pointer";
            
            if (variant === "primary") {
                return (
                    <a href={href} target="_blank" rel="noopener noreferrer" className={`${baseStyle} bg-[#1C1C1A] text-white`}>
                        <span className="absolute inset-0 w-full h-full bg-[#8A735E] transform -translate-x-full group-hover:translate-x-0 transition-transform duration-500 ease-out"></span>
                        <span className="relative z-10 flex items-center gap-3 tracking-wide">
                            {children}
                            <svg className="w-4 h-4 transform group-hover:translate-x-1 group-hover:scale-110 transition-all duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 5l7 7m0 0l-7 7m7-7H3" />
                            </svg>
                        </span>
                    </a>
                );
            }
            
            return (
                <a href={href} target="_blank" rel="noopener noreferrer" className={`${baseStyle} bg-[#8A735E] text-white hover:bg-white hover:text-[#1C1C1A]`}>
                    <span className="relative z-10 tracking-wide">{children}</span>
                </a>
            );
        };

        function App() {
            return (
                <div className="relative">
                    
                    {/* Осязаемая текстура (Film Grain) */}
                    <div 
                        className="pointer-events-none fixed inset-0 z-50 opacity-[0.03] mix-blend-multiply" 
                        style={{ backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E")` }}
                    ></div>

                    <ScrollProgressLine />

                    {/* Экран 1: Hero */}
                    <Section className="min-h-[95vh] flex flex-col justify-center pt-10">
                        <FadeIn delay={0}>
                            <div className="mb-14">
                                <VediVibeLogo className="w-16 h-16" />
                            </div>
                            <div className="flex items-center gap-4 mb-8">
                                <p className="uppercase tracking-widest text-[11px] font-medium text-[#8A735E]">
                                    Vedi Vibe · творческая лаборатория
                                </p>
                            </div>
                            <h1 className="font-serif text-4xl md:text-5xl lg:text-7xl leading-[1.05] mb-10 text-[#1C1C1A] tracking-tight">
                                Стратегическая <em className="italic text-[#8A735E] pr-2">креативная</em> сессия <br className="hidden lg:block" />
                                по сборке концепции
                            </h1>
                            <p className="text-xl md:text-2xl text-[#4A4A4A] leading-relaxed mb-12 max-w-2xl font-light">
                                Для экспертов и собственников, у которых есть глубина продукта, но ещё не собрана точная форма: позиционирование, коммуникация, визуальный язык и стиль контента.
                            </p>
                            <div>
                                <Button>Написать в Telegram</Button>
                            </div>
                        </FadeIn>
                    </Section>

                    {/* Экран 2: Проблема */}
                    <Section className="bg-white border-y border-[#EBEBE6]/60">
                        <FadeIn>
                            <h2 className="font-serif text-3xl md:text-5xl leading-[1.15] mb-14 tracking-tight">
                                Когда у проекта есть глубина, <br className="hidden md:block"/>
                                но <em className="italic text-[#8A735E] pr-2">нет точной формы</em>
                            </h2>
                        </FadeIn>
                        <ul className="space-y-0 mb-16 relative">
                            <div className="absolute left-[11px] top-8 bottom-8 w-px bg-[#EBEBE6] hidden md:block"></div>
                            {[
                                "Ваш продукт сильнее, чем его внешняя подача.",
                                "Позиционирование не передаёт уровень мышления, который стоит за проектом.",
                                "Визуал, контент и коммуникация существуют отдельно друг от друга.",
                                "Вы уже выросли из стандартной упаковки, но не понимаете, что должно прийти ей на смену."
                            ].map((text, i) => (
                                <FadeIn delay={i * 100} key={i}>
                                    <li className="flex items-start py-6 relative z-10">
                                        <span className="text-[#8A735E] text-2xl leading-none mt-0.5 mr-6 bg-white py-1">·</span>
                                        <span className="text-xl md:text-2xl text-[#4A4A4A] font-light leading-relaxed">{text}</span>
                                    </li>
                                </FadeIn>
                            ))}
                        </ul>
                        <FadeIn delay={400}>
                            <FocusFrame className="bg-[#F9F9F7]">
                                <p className="text-xl md:text-2xl font-serif leading-relaxed text-[#1C1C1A]">
                                    Это не проблема качества вашей работы.<br/>
                                    <span className="text-[#8A735E] italic">Это проблема несобранной концепции.</span>
                                </p>
                            </FocusFrame>
                        </FadeIn>
                    </Section>

                    {/* Экран 3: Для кого */}
                    <Section>
                        <FadeIn>
                            <div className="flex items-center gap-4 mb-6">
                                <span className="text-[#8A735E] text-xs tracking-widest uppercase font-medium">Аудитория</span>
                                <div className="h-px w-12 bg-[#8A735E]/30"></div>
                            </div>
                            <h2 className="font-serif text-3xl md:text-5xl leading-tight mb-10 tracking-tight">
                                Для кого подходит этот формат
                            </h2>
                            <p className="text-xl text-[#4A4A4A] mb-12 font-light">
                                Для экспертов, собственников и создателей, которые:
                            </p>
                        </FadeIn>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
                            {[
                                "не ищут «просто красивую упаковку», а хотят точного соответствия между глубиной проекта и его формой;",
                                "ценят качество, логику, концепцию и зрелую коммуникацию;",
                                "чувствуют, что проект уже вырос из обычного маркетинга;",
                                "хотят не хаотичный набор решений, а цельный образ проекта."
                            ].map((text, i) => (
                                <FadeIn delay={i * 150} key={i}>
                                    <FocusFrame className="bg-white h-full border border-transparent hover:border-[#EBEBE6] transition-colors duration-500 group">
                                        <p className="text-[#4A4A4A] font-light text-lg leading-relaxed group-hover:text-[#1C1C1A] transition-colors duration-500">{text}</p>
                                    </FocusFrame>
                                </FadeIn>
                            ))}
                        </div>
                    </Section>

                    {/* Экран 4: Что это за услуга */}
                    <Section className="bg-[#1C1C1A] text-white relative overflow-hidden">
                        <svg className="absolute -right-64 -top-64 w-[800px] h-[800px] opacity-5 pointer-events-none" viewBox="0 0 100 100" fill="none">
                            <circle cx="50" cy="50" r="49" stroke="white" strokeWidth="0.2" />
                            <circle cx="50" cy="50" r="30" stroke="white" strokeWidth="0.2" strokeDasharray="1 2" />
                        </svg>

                        <FadeIn>
                            <h2 className="font-serif text-3xl md:text-5xl leading-tight mb-10 text-white tracking-tight">
                                Что происходит <em className="italic text-[#8A735E] pr-2">в этой работе</em>
                            </h2>
                            <p className="text-xl md:text-2xl text-[#A1A1A1] font-light mb-14 leading-relaxed">
                                Это не коучинг, не маркетинговый аудит и не просто креативный брейншторм. <br/><br/>
                                Это работа, в которой <span className="text-white font-medium">собирается сама концепция</span> проекта:
                            </p>
                        </FadeIn>
                        <ul className="space-y-6 mb-16">
                            {[
                                "что в нём должно считываться,",
                                "какой образ ему соответствует,",
                                "какая атмосфера усиливает его смысл,",
                                "как это перевести в позиционирование, коммуникацию и визуальный язык."
                            ].map((text, i) => (
                                <FadeIn delay={i * 100} key={i}>
                                    <li className="flex items-start text-[#D1D1D1] font-light text-xl">
                                        <span className="text-[#8A735E] mr-6 mt-1.5">—</span>
                                        <span className="leading-relaxed">{text}</span>
                                    </li>
                                </FadeIn>
                            ))}
                        </ul>
                        <FadeIn delay={400}>
                            <FocusFrame dark className="bg-[#151514]">
                                <p className="text-2xl md:text-3xl font-serif text-[#F9F9F7] leading-relaxed italic">
                                    Итог — не набор идей, а собранная концепция проекта, на которую уже можно опирать сайт, контент, дизайн и дальнейшее развитие.
                                </p>
                            </FocusFrame>
                        </FadeIn>
                    </Section>

                    {/* Экран 5: Как проходит работа */}
                    <Section>
                        <FadeIn>
                            <h2 className="font-serif text-3xl md:text-5xl leading-tight mb-16 tracking-tight">
                                Как проходит сборка концепции
                            </h2>
                        </FadeIn>
                        <div className="space-y-8 relative">
                            <div className="absolute left-8 top-10 bottom-10 w-px bg-[#8A735E]/20 hidden md:block"></div>
                            {[
                                { num: "01", title: "Погружение", desc: "Разбираем проект, продукт, текущую коммуникацию и вашу точку развития." },
                                { num: "02", title: "Диагностика", desc: "Смотрим, что сейчас не совпадает: смысл, образ, визуальная подача, тон и ожидания аудитории." },
                                { num: "03", title: "Сборка концепции", desc: "Формируем ядро проекта, образ бренда, атмосферу, направление визуального языка и логику коммуникации." },
                                { num: "04", title: "Перевод в форму", desc: "Собираем опоры, на которые потом можно опереть сайт, контент, дизайн, презентацию и дальнейшую упаковку." }
                            ].map((step, i) => (
                                <FadeIn delay={i * 150} key={i}>
                                    <div className="flex flex-col md:flex-row bg-white relative z-10 group overflow-hidden">
                                        <div className="md:w-32 flex-shrink-0 bg-[#F9F9F7] md:bg-transparent p-6 md:p-8 flex items-center md:items-start justify-between md:justify-start transition-colors duration-500 group-hover:bg-[#F9F9F7]">
                                            <span className="text-[#8A735E] font-serif text-3xl italic">{step.num}.</span>
                                            <div className="w-2 h-2 rounded-full bg-[#8A735E] md:hidden"></div>
                                        </div>
                                        <div className="p-6 md:p-8 md:pl-0 border-t md:border-t-0 md:border-l border-[#EBEBE6] flex-grow relative">
                                            <h3 className="text-2xl font-serif mb-3 text-[#1C1C1A]">{step.title}</h3>
                                            <p className="text-[#4A4A4A] font-light text-lg leading-relaxed relative z-10">{step.desc}</p>
                                        </div>
                                    </div>
                                </FadeIn>
                            ))}
                        </div>
                    </Section>

                    {/* Экран 6: Что вы получаете (Интеллектуальная Сетка) */}
                    <Section className="bg-white border-y border-[#EBEBE6]/60 relative overflow-hidden">
                        <div 
                            className="absolute inset-0 pointer-events-none opacity-[0.03] z-0"
                            style={{ 
                                backgroundImage: `linear-gradient(#1C1C1A 1px, transparent 1px), linear-gradient(90deg, #1C1C1A 1px, transparent 1px)`,
                                backgroundSize: '40px 40px' 
                            }}
                        ></div>

                        <FadeIn className="relative z-10">
                            <div className="flex items-center gap-4 mb-6">
                                <span className="text-[#8A735E] text-xs tracking-widest uppercase font-medium">Артефакты</span>
                                <div className="h-px w-12 bg-[#8A735E]/30"></div>
                            </div>
                            <h2 className="font-serif text-3xl md:text-5xl leading-tight mb-8 tracking-tight">
                                Что вы получаете <em className="italic text-[#8A735E] pr-2">в результате</em>
                            </h2>
                            <p className="text-xl md:text-2xl text-[#4A4A4A] font-light mb-16 leading-relaxed bg-white/90 inline-block pr-4 backdrop-blur-sm">
                                Не вдохновение и не список общих советов.<br/>
                                А собранную концепцию проекта, которую можно сразу использовать в работе.
                            </p>
                        </FadeIn>
                        
                        <SpotlightGrid className="grid grid-cols-1 md:grid-cols-2 relative z-10 border-t border-l border-[#EBEBE6]/60">
                            {[
                                { title: "Ядро позиционирования", desc: "Чёткую формулировку, которая передаёт реальную глубину вашего проекта." },
                                { title: "Образ проекта", desc: "Понимание, каким должен быть ваш бренд по характеру, впечатлению и смыслу." },
                                { title: "Атмосферу бренда", desc: "Точное ощущение, которое должен создавать ваш проект." },
                                { title: "Направление визуального языка", desc: "Понимание, как должны выглядеть сайт, визуал, оформление и подача бренда." },
                                { title: "Логику коммуникации", desc: "Как говорить о проекте так, чтобы это соответствовало вашему уровню и считывалось вашей аудиторией." },
                                { title: "Стиль контента", desc: "Какой тон, подача и тип материалов соответствуют вашему проекту." },
                                { title: "Идеи для постов и смысловых линий", desc: "Темы, рубрики и направления контента, которые продолжают вашу концепцию." },
                                { title: "Опоры для сайта / презентации", desc: "Какие смыслы, формулировки и акценты нужно выносить в структуру и тексты." },
                                { title: "Основание для реализации", desc: "Понимание, что дальше делать дизайнеру, команде или нейросетям, чтобы не потерять суть." },
                                { title: "Концепция в виде структуры", desc: "Чтобы не держать всё в голове, а опираться на ясную систему." }
                            ].map((item, i) => (
                                <FadeIn delay={i * 50} key={i} className="h-full">
                                    <div className="group border-r border-b border-[#EBEBE6]/60 p-8 h-full bg-white/40 hover:bg-white transition-all duration-500 relative">
                                        <div className="flex items-baseline gap-4 mb-4">
                                            <span className="text-xs font-medium text-[#8A735E] tracking-widest opacity-60">{(i + 1).toString().padStart(2, '0')}</span>
                                            <h3 className="text-xl font-serif text-[#1C1C1A]">{item.title}</h3>
                                        </div>
                                        <p className="text-[#4A4A4A] font-light leading-relaxed pl-8 relative z-10">{item.desc}</p>
                                    </div>
                                </FadeIn>
                            ))}
                        </SpotlightGrid>
                    </Section>

                    {/* Экран 7: Почему обычной упаковки недостаточно */}
                    <Section>
                        <FadeIn>
                            <h2 className="font-serif text-3xl md:text-5xl leading-[1.15] mb-10 tracking-tight">
                                Почему этого недостаточно просто <em className="italic text-[#8A735E] pr-2">«сделать красиво»</em>
                            </h2>
                            <div className="text-xl md:text-2xl text-[#4A4A4A] font-light leading-relaxed mb-10">
                                Когда у проекта нет собранной концепции, новый визуал, тексты или продвижение могут только усилить хаос. Сначала важно понять:
                            </div>
                            <FocusFrame className="bg-white mb-10 group hover:shadow-[0_0_40px_rgba(138,115,94,0.05)] transition-shadow duration-700">
                                <ul className="space-y-5">
                                    {[
                                        "что именно должен передавать проект,",
                                        "какой образ ему соответствует,",
                                        "какая атмосфера усиливает его смысл,",
                                        "как всё это собирается в одну систему."
                                    ].map((text, i) => (
                                        <li key={i} className="text-[#1C1C1A] font-light text-xl flex items-center gap-4 group-hover:translate-x-2 transition-transform duration-500" style={{ transitionDelay: `${i * 50}ms` }}>
                                            <div className="w-1.5 h-1.5 rounded-full bg-[#8A735E] transition-transform duration-500 group-hover:scale-150"></div>
                                            <span className="leading-relaxed">{text}</span>
                                        </li>
                                    ))}
                                </ul>
                            </FocusFrame>
                            <p className="font-serif text-2xl md:text-3xl italic text-[#1C1C1A]">
                                Поэтому работа начинается не с оформления, а с концепции.
                            </p>
                        </FadeIn>
                    </Section>

                    {/* Экран 8: О подходе Ирины */}
                    <Section className="bg-[#EBEBE6]/40">
                        <FadeIn>
                            <h2 className="font-serif text-3xl md:text-5xl leading-tight mb-10 tracking-tight">
                                Почему я работаю <em className="italic text-[#8A735E] pr-2">именно так</em>
                            </h2>
                            <p className="text-xl md:text-2xl text-[#4A4A4A] font-light leading-relaxed mb-12">
                                Моя сильная сторона — видеть то, что часто остаётся несобранным:
                            </p>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-14">
                                {[
                                    "связи между смыслом проекта и его формой,",
                                    "атмосферу, которая ему соответствует,",
                                    "образ, который должен считываться,",
                                    "стиль, который усиливает, а не размывает суть."
                                ].map((text, i) => (
                                    <div key={i} className="flex items-start text-[#1C1C1A] font-light text-xl border-t border-[#8A735E]/30 pt-6 leading-relaxed">
                                        {text}
                                    </div>
                                ))}
                            </div>
                            <div className="bg-white p-8 md:p-12 shadow-sm border border-transparent hover:border-[#8A735E]/20 transition-colors duration-700">
                                <p className="text-xl md:text-2xl font-serif text-[#1C1C1A] leading-relaxed italic">
                                    Я не начинаю с шаблонной упаковки. Сначала я собираю саму концепцию — чтобы позиционирование, визуальный язык и контент перестали спорить друг с другом.
                                </p>
                            </div>
                        </FadeIn>
                    </Section>

                    {/* Экран 9: Формат и стоимость */}
                    <Section>
                        <FadeIn>
                            <div className="flex items-center gap-4 mb-6">
                                <span className="text-[#8A735E] text-xs tracking-widest uppercase font-medium">Условия</span>
                                <div className="h-px w-12 bg-[#8A735E]/30"></div>
                            </div>
                            <h2 className="font-serif text-3xl md:text-5xl leading-tight mb-16 tracking-tight">
                                Формат и стоимость
                            </h2>
                            <div className="space-y-10 mb-16">
                                <div className="relative pl-8 group">
                                    <div className="absolute left-0 top-2 w-2 h-2 rounded-full bg-[#1C1C1A] transition-transform duration-500 group-hover:scale-150"></div>
                                    <div className="absolute left-[3px] top-6 bottom-[-30px] w-px bg-[#EBEBE6]"></div>
                                    <h3 className="text-2xl font-serif mb-3">Короткое знакомство — бесплатно</h3>
                                    <p className="text-[#4A4A4A] font-light text-xl leading-relaxed">Короткий разговор, чтобы понять ваш проект и проверить, подходит ли вам этот формат.</p>
                                </div>
                                <div className="relative pl-8 group">
                                    <div className="absolute left-0 top-2 w-2 h-2 rounded-full bg-[#8A735E] transition-transform duration-500 group-hover:scale-150 group-hover:shadow-[0_0_10px_#8A735E]"></div>
                                    <h3 className="text-2xl font-serif mb-3">Основная сессия — онлайн, 2,5–3 часа</h3>
                                    <p className="text-[#4A4A4A] font-light text-xl leading-relaxed">После сессии — в течение 2 дней вы получаете собранную концепцию проекта в структурированном виде.</p>
                                </div>
                            </div>
                            
                            <div className="mb-14 p-8 md:p-12 bg-[#F9F9F7] border border-[#EBEBE6] relative overflow-hidden group">
                                <div className="absolute inset-0 bg-white opacity-0 group-hover:opacity-100 transition-opacity duration-700 pointer-events-none"></div>
                                <div className="relative z-10">
                                    <div className="font-serif text-5xl md:text-6xl mb-6 text-[#8A735E] tracking-tight transition-transform duration-500 origin-left group-hover:scale-[1.02]">
                                        50 000 рублей
                                    </div>
                                    <p className="text-[#4A4A4A] font-light text-xl leading-relaxed max-w-xl">
                                        Это не разовый разговор ради идей. Это работа по сборке концепции проекта, которая помогает избежать месяцев неточных решений.
                                    </p>
                                </div>
                            </div>

                            <Button>Написать в Telegram</Button>
                        </FadeIn>
                    </Section>

                    {/* Экран 10: Финальный CTA */}
                    <Section className="bg-[#1C1C1A] text-white text-center py-32 md:py-40 relative overflow-hidden">
                        <svg className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[1000px] h-[1000px] opacity-10 pointer-events-none" viewBox="0 0 100 100" fill="none">
                            <circle cx="50" cy="50" r="49" stroke="#8A735E" strokeWidth="0.1" />
                            <circle cx="50" cy="50" r="35" stroke="#8A735E" strokeWidth="0.1" />
                            <path d="M50 15 A 35 35 0 0 1 85 50" stroke="#8A735E" strokeWidth="0.5" className="origin-center animate-[spin_20s_linear_infinite]" />
                        </svg>

                        <FadeIn className="relative z-10 flex flex-col items-center">
                            <h2 className="font-serif text-4xl md:text-5xl lg:text-6xl leading-tight mb-8 text-white tracking-tight">
                                Начните с <em className="italic text-[#8A735E] pr-2">короткого знакомства</em>
                            </h2>
                            <p className="text-xl md:text-2xl text-[#A1A1A1] font-light leading-relaxed mb-16 max-w-2xl mx-auto">
                                Короткий разговор, чтобы понять контекст вашего проекта и проверить, подходит ли вам этот формат.
                                <br className="hidden md:block mt-4"/>
                                Чтобы увидеть, есть ли здесь точное совпадение.
                            </p>
                            <div className="mb-24">
                                <Button variant="secondary">Написать в Telegram</Button>
                            </div>
                            
                            <div className="flex flex-col items-center justify-center opacity-80 mt-10">
                                <VediVibeLogo className="w-10 h-10 mb-6" light={true} />
                                <p className="uppercase tracking-widest text-[10px] md:text-xs font-medium text-[#8A735E]">
                                    Vedi Vibe · творческая лаборатория
                                </p>
                            </div>
                        </FadeIn>
                    </Section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
