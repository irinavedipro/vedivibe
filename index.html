<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>vedi vibe — стратегическая креативная сессия</title>
    
    <!-- Подключение шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,300;0,400;1,400&display=swap" rel="stylesheet">
    
    <!-- Подключение Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Подключение React и Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        
        @keyframes bloom-glow {
            0% { filter: drop-shadow(0 0 2px rgba(34, 197, 94, 0.2)); opacity: 0.8; }
            50% { filter: drop-shadow(0 0 15px rgba(34, 197, 94, 0.6)); opacity: 1; }
            100% { filter: drop-shadow(0 0 2px rgba(34, 197, 94, 0.2)); opacity: 0.8; }
        }
        .animate-bloom { animation: bloom-glow 3s ease-in-out infinite; }

        @keyframes heart-sparkle {
            0%, 100% { box-shadow: 0 0 8px rgba(34, 197, 94, 0.4); background-color: #113926; }
            50% { box-shadow: 0 0 25px rgba(34, 197, 94, 0.9); background-color: #22C55E; }
        }
        .animate-heart { animation: heart-sparkle 2s ease-in-out infinite; }

        @keyframes arrow-attract {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }
        .animate-btn-arrow { animation: arrow-attract 1.5s ease-in-out infinite; }

        @keyframes button-pulse {
            0%, 100% { box-shadow: 0 0 0px rgba(17, 57, 38, 0); }
            50% { box-shadow: 0 0 20px rgba(17, 57, 38, 0.2); }
        }
        .animate-btn-glow { animation: button-pulse 3s ease-in-out infinite; }

        .garden-transition {
            transition: background-color 2000ms cubic-bezier(0.4, 0, 0.2, 1);
            will-change: background-color;
        }
    </style>
</head>
<body class="bg-[#F8F8F6] text-[#1D1D1B] font-sans selection:bg-[#113926]/20 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const TELEGRAM_LINK = "https://t.me/vedi_irina?text=" + encodeURIComponent("Ирина, добрый день. Хочу обсудить навигацию и сборку концепции.");
        
        const MoanaSpiral = ({ isBloomed = false, size = "w-10 h-10 md:w-14 md:h-14" }) => {
            const strokeColor = isBloomed ? "#113926" : "#8A8A8A";
            return (
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" 
                     className={`${size} transition-all duration-1000 ${isBloomed ? 'animate-bloom' : 'opacity-60'}`}>
                    <path 
                        d="M50.5,50.5 c0,0 2.8-4.1 6.3-2.1 c4.4,2.5 1.1,9.8-5.3,10.3 c-8.5,0.7-12.8-10.4-8.1-17.5 c6.3-9.5,21.1-6.8,26.4,2.8 c6.9,12.5-4.5,29.4-18.4,31.5 c-18.2,2.7-34.5-13.6-34-31.4 c0.6-23.5,24.5-40,46.5-35.1"
                        stroke={strokeColor}
                        strokeWidth="2.5"
                        strokeLinecap="round"
                    />
                    <path 
                        d="M50.5,50.5 c0,0 2.8-4.1 6.3-2.1 c4.4,2.5 1.1,9.8-5.3,10.3 c-8.5,0.7-12.8-10.4-8.1-17.5"
                        stroke={strokeColor}
                        strokeWidth="0.8"
                        strokeLinecap="round"
                        className="opacity-40"
                    />
                </svg>
            );
        };

        const FadeIn = ({ children, delay = 0, className = "", direction = "up" }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const currentRef = ref.current;
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.unobserve(currentRef);
                        }
                    },
                    { threshold: 0.001, rootMargin: '0px 0px -5% 0px' }
                );
                if (currentRef) observer.observe(currentRef);
                return () => { if (currentRef) observer.unobserve(currentRef); };
            }, []);

            const transformStyle = useMemo(() => {
                if (isVisible) return 'translate3d(0, 0, 0)';
                return direction === 'horizontal' ? 'translate3d(-15px, 0, 0)' : 'translate3d(0, 10px, 0)';
            }, [isVisible, direction]);

            return (
                <div ref={ref} className={`transition-all duration-700 ease-out will-change-transform ${isVisible ? 'opacity-100' : 'opacity-0'} ${className}`}
                    style={{ transitionDelay: `${delay}ms`, transform: transformStyle }}>
                    {children}
                </div>
            );
        };

        const Section = ({ children, className = "", id = "" }) => (
            <section id={id} className={`py-12 md:py-28 px-6 pl-20 md:pl-48 lg:pl-56 w-full flex justify-center relative z-20 ${className}`}>
                <div className="w-full max-w-3xl relative z-20">
                    {children}
                </div>
            </section>
        );

        const Button = React.forwardRef(({ children, href = TELEGRAM_LINK, isBloomed = false }, ref) => {
            return (
                <a ref={ref} href={href} target="_blank" rel="noopener noreferrer" 
                   className={`inline-flex items-center justify-center px-8 py-4 md:px-10 md:py-5 bg-[#113926] text-white text-[11px] md:text-sm tracking-widest uppercase font-medium hover:bg-[#1A4D35] transition-all duration-700 relative z-10 w-full md:w-auto text-center group ${isBloomed ? 'animate-btn-glow' : ''}`}>
                    <span className={`mr-3 transition-transform duration-500 ${isBloomed ? 'animate-btn-arrow' : 'group-hover:translate-x-1'}`}>→</span>
                    {children}
                </a>
            );
        });

        function App() {
            const [lineCoords, setLineCoords] = useState({ top: 0, height: 0 });
            const [dotProgress, setDotProgress] = useState(0);
            const startRef = useRef(null);
            const endRef = useRef(null);

            const updateMeasurements = () => {
                if (startRef.current && endRef.current) {
                    const startRect = startRef.current.getBoundingClientRect();
                    const endRect = endRef.current.getBoundingClientRect();
                    const scrollY = window.pageYOffset || document.documentElement.scrollTop;
                    
                    const absoluteTop = startRect.top + scrollY;
                    const absoluteBottom = endRect.top + scrollY;
                    const topOffset = absoluteTop + 16; 
                    
                    setLineCoords({
                        top: topOffset,
                        height: Math.max(0, absoluteBottom + (endRect.height / 2) - topOffset)
                    });
                }
            };

            useEffect(() => {
                const timer = setTimeout(updateMeasurements, 500);
                window.addEventListener('resize', updateMeasurements);
                window.addEventListener('scroll', updateMeasurements);
                document.fonts.ready.then(updateMeasurements);

                return () => {
                    clearTimeout(timer);
                    window.removeEventListener('resize', updateMeasurements);
                    window.removeEventListener('scroll', updateMeasurements);
                };
            }, []);

            useEffect(() => {
                let ticking = false;
                const handleProgress = () => {
                    if (!ticking) {
                        window.requestAnimationFrame(() => {
                            const scrollY = window.pageYOffset || document.documentElement.scrollTop;
                            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                            
                            // Расчёт прогресса относительно общего скролла страницы
                            const progress = maxScroll > 0 ? scrollY / maxScroll : 0;
                            setDotProgress(Math.max(0, Math.min(1, progress)));
                            
                            ticking = false;
                        });
                        ticking = true;
                    }
                };
                window.addEventListener('scroll', handleProgress, { passive: true });
                return () => window.removeEventListener('scroll', handleProgress);
            }, []);

            const isAtEnd = dotProgress > 0.98;

            return (
                <div className={`relative overflow-x-hidden garden-transition ${isAtEnd ? 'bg-[#E2F0D9]' : 'bg-[#F8F8F6]'}`}
                     style={isAtEnd ? { backgroundImage: 'radial-gradient(circle at bottom, rgba(34, 197, 94, 0.08) 0%, transparent 80%)' } : {}}>
                    
                    {/* Путеводная линия */}
                    {lineCoords.height > 0 && (
                        <div className="absolute left-6 md:left-24 lg:left-32 w-[1.5px] bg-[#D4D4D2] z-50 pointer-events-none"
                             style={{ top: `${lineCoords.top}px`, height: `${lineCoords.height}px` }}>
                            
                            {/* Верхняя спираль */}
                            <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-transparent flex items-center justify-center">
                                <MoanaSpiral />
                            </div>
                            
                            {/* Нижняя спираль */}
                            <div className="absolute top-full left-1/2 -translate-x-1/2 -translate-y-1/2 bg-transparent flex items-center justify-center">
                                <MoanaSpiral isBloomed={isAtEnd} />
                            </div>

                            {/* Живое ядро — теперь доходит точно до конца линии */}
                            <div className={`absolute w-3 h-3 rounded-full left-1/2 z-10 transition-colors duration-300 will-change-transform ${isAtEnd ? 'animate-heart' : 'bg-[#113926]'}`}
                                 style={{ 
                                     transform: `translate3d(-50%, ${dotProgress * lineCoords.height}px, 0)`,
                                     top: '0'
                                 }}></div>
                        </div>
                    )}

                    <Section className="min-h-[90svh] flex flex-col justify-center">
                        <FadeIn delay={100}>
                            <div className="mb-8 md:mb-16">
                                <p className="uppercase tracking-[0.15em] text-[9px] md:text-xs font-medium text-[#8A8A8A] mb-1 md:mb-3">веди вайб</p>
                                <p className="text-[10px] md:text-sm font-light text-[#8A8A8A]">лаборатория живого творчества в эпоху ии</p>
                            </div>
                            <div ref={startRef}>
                                <h1 className="font-serif text-[24px] md:text-5xl lg:text-6xl leading-[1.2] md:leading-[1.3] mb-4 md:mb-6 text-[#1D1D1B] tracking-tight">
                                    <span className="block mb-1 text-[#1D1D1B]">точка, в которой</span>
                                    <span className="block mb-1 text-[#1D1D1B]">вы выбираете,</span>
                                    <span className="block text-[#1D1D1B]">что именно масштабируете</span>
                                </h1>
                            </div>
                            <p className="font-serif text-lg md:text-3xl text-[#5C5C5A] italic mb-8 md:mb-16">хаос или систему</p>
                            
                            <div className="flex flex-col gap-3 md:gap-4 font-light text-[15px] md:text-2xl text-[#1D1D1B] mb-10 md:mb-16">
                                <FadeIn delay={100} className="flex items-center gap-3 text-[#1D1D1B]">
                                    <span>разобрать хаос</span>
                                    <svg className="w-3 h-3 md:w-5 md:h-5 text-[#8A8A8A] opacity-60" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M19 14l-7 7m0 0l-7-7m7 7V3" />
                                    </svg>
                                </FadeIn>
                                <FadeIn delay={250} className="flex items-center gap-3 text-[#1D1D1B]">
                                    <span>собрать опору</span>
                                    <svg className="w-3 h-3 md:w-5 md:h-5 text-[#8A8A8A] opacity-60" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M19 14l-7 7m0 0l-7-7m7 7V3" />
                                    </svg>
                                </FadeIn>
                                <FadeIn delay={400}>
                                    <div className="text-[#113926] font-medium">масштабировать систему</div>
                                </FadeIn>
                            </div>

                            <FadeIn delay={600}>
                                <div className="w-full md:w-auto inline-flex"><Button>начать навигацию</Button></div>
                            </FadeIn>
                        </FadeIn>
                    </Section>

                    <Section>
                        <FadeIn>
                            <p className="text-[20px] md:text-3xl font-serif text-[#1D1D1B] leading-relaxed italic mb-8">когда в проекте есть хаос —<br/>вы не переходите на следующий виток</p>
                            <div className="text-[17px] md:text-2xl font-light text-[#5C5C5A] leading-relaxed mb-10 space-y-2">
                                <p>суть — одна</p><p>транслируете другое</p><p>аудитория считывает третье</p>
                            </div>
                        </FadeIn>
                        <div className="flex flex-wrap items-center gap-3 md:gap-4 font-light text-[15px] md:text-2xl text-[#1D1D1B] mb-16 md:mb-20">
                            <FadeIn delay={100}><span>суть</span></FadeIn>
                            <FadeIn delay={200} className="flex items-center"><span className="text-[#8A8A8A] relative flex items-center justify-center">→<span className="absolute w-[140%] h-[1px] bg-[#8A8A8A] rotate-[-45deg]"></span></span></FadeIn>
                            <FadeIn delay={300}><span>передача</span></FadeIn>
                            <FadeIn delay={400} className="flex items-center"><span className="text-[#8A8A8A] relative flex items-center justify-center">→<span className="absolute w-[140%] h-[1px] bg-[#8A8A8A] rotate-[-45deg]"></span></span></FadeIn>
                            <FadeIn delay={500}><span>восприятие</span></FadeIn>
                        </div>
                        <div className="space-y-12 md:space-y-16">
                            <FadeIn>
                                <p className="text-[18px] md:text-2xl font-serif text-[#1D1D1B] italic mb-5 text-[#1D1D1B]">когда вы действуете внутри хаоса</p>
                                <div className="text-[16px] md:text-xl font-light text-[#5C5C5A] leading-relaxed mb-6 space-y-2 pl-4 border-l border-[#D4D4D2]">
                                    <p>маркетинг</p><p>контент</p><p>продвижение</p>
                                </div>
                                <FadeIn direction="horizontal" delay={200}><p className="text-[18px] md:text-2xl text-[#113926] font-medium flex items-center"><span className="mr-3 text-[#8A8A8A]">→</span> усиливаете разрыв</p></FadeIn>
                            </FadeIn>
                            <FadeIn>
                                <p className="text-[18px] md:text-2xl font-serif text-[#1D1D1B] italic mb-5 text-[#1D1D1B]">когда вы меняете исходную логику проекта</p>
                                <div className="text-[16px] md:text-xl font-light text-[#5C5C5A] leading-relaxed mb-6 space-y-2 pl-4 border-l border-[#D4D4D2]">
                                    <p>разобрать основу</p><p>определить уровень</p><p>собрать систему</p>
                                </div>
                                <FadeIn direction="horizontal" delay={200}>
                                    <div className="text-[18px] md:text-2xl text-[#113926] font-medium flex items-center flex-wrap gap-2">
                                        <span className="mr-2 text-[#8A8A8A]">→</span> 
                                        <span>переходите на следующий виток</span>
                                        <div className="ml-2 inline-block translate-y-1">
                                            <MoanaSpiral size="w-8 h-8 md:w-10 md:h-10" isBloomed={isAtEnd} />
                                        </div>
                                    </div>
                                </FadeIn>
                            </FadeIn>
                        </div>
                    </Section>

                    <Section className="pb-32">
                        <FadeIn>
                            <p className="text-[17px] md:text-2xl font-light text-[#5C5C5A] leading-relaxed mb-10 md:mb-12">я разбираю логику проекта<br/>определяю уровень автора и аудитории<br/>и собираю концепцию,<br/>которую вы сможете масштабировать</p>
                            <p className="text-[20px] md:text-3xl font-serif text-[#1D1D1B] leading-relaxed italic mb-8">через 2 дня<br/>у вас есть концепция, в которой собраны:</p>
                            <div className="flex flex-col gap-4 font-light text-[16px] md:text-2xl text-[#1D1D1B] mb-12">
                                {["ясное ядро проекта", "направление развития", "понимание аудитории", "язык коммуникации", "идеи контента", "визуальный код и эстетика"].map((text, i) => (
                                    <FadeIn delay={i * 60} key={i}><div className="flex items-center group text-[#1D1D1B]"><span className="text-[#8A8A8A] mr-4 transition-transform duration-700 group-hover:translate-x-2">→</span>{text}</div></FadeIn>
                                ))}
                            </div>
                            <p className="text-[17px] md:text-2xl font-light text-[#5C5C5A] leading-relaxed mb-12 md:mb-16">эту систему<br/>вы передаёте команде и ии<br/>и больше не держите проект<br/>на себе</p>
                            <div className="mb-8"><div className="font-sans text-[22px] md:text-3xl text-[#1D1D1B]">стоимость 50 000 рублей</div></div>
                            <div className="flex flex-col items-start gap-4">
                                <Button ref={endRef} isBloomed={isAtEnd}>начать навигацию</Button>
                                <span className="text-[11px] md:text-sm font-light text-[#8A8A8A] opacity-70">личный диалог со мной в telegram</span>
                            </div>
                        </FadeIn>
                    </Section>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
